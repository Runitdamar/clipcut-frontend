<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ClipCut AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/framer-motion@11.11.17/dist/framer-motion.js"></script>
<script>window.Motion = window.FramerMotion;</script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          heading: ['Instrument Serif', 'serif'],
          body: ['Barlow', 'sans-serif'],
        },
        borderRadius: { DEFAULT: '9999px' }
      }
    }
  }
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; font-family: 'Barlow', sans-serif; overflow-x: hidden; }

  .liquid-glass {
    background: rgba(255,255,255,0.01);
    background-blend-mode: luminosity;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border: none;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
  }
  .liquid-glass::before {
    content: "";
    position: absolute; inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.45) 0%,
      rgba(255,255,255,0.15) 20%,
      rgba(255,255,255,0) 40%,
      rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.15) 80%,
      rgba(255,255,255,0.45) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }
  .liquid-glass-strong {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(50px);
    -webkit-backdrop-filter: blur(50px);
    border: none;
    box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
    position: relative;
    overflow: hidden;
  }
  .liquid-glass-strong::before {
    content: "";
    position: absolute; inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.5) 0%,
      rgba(255,255,255,0.2) 20%,
      rgba(255,255,255,0) 40%,
      rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.2) 80%,
      rgba(255,255,255,0.5) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  /* upload zones */
  .upload-zone { cursor: pointer; transition: box-shadow 0.2s; }
  .upload-zone:hover { box-shadow: inset 0 1px 1px rgba(255,255,255,0.2), 0 0 0 1px rgba(255,255,255,0.15); }
  .upload-zone.filled { box-shadow: inset 0 1px 1px rgba(255,255,255,0.2), 0 0 0 1px rgba(255,255,255,0.3); }

  /* progress bar */
  .prog-track { height: 2px; background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; }
  .prog-fill { height: 100%; background: white; border-radius: 99px; transition: width 0.3s ease; }

  @keyframes pulse-soft { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .pulsing { animation: pulse-soft 1.8s infinite; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;
const { motion, AnimatePresence } = window.Motion;

const BACKEND = "https://runitdamar-clipcut-backend.hf.space";
const CHUNK = 5 * 1024 * 1024;

// ── FadingVideo ──────────────────────────────────────────────────────────────
function FadingVideo({ src, className, style }) {
  const videoRef = useRef(null);
  const rafRef = useRef(null);
  const fadingOutRef = useRef(false);
  const FADE_MS = 500;
  const FADE_OUT_LEAD = 0.55;

  const fadeTo = useCallback((target, duration) => {
    cancelAnimationFrame(rafRef.current);
    const video = videoRef.current;
    if (!video) return;
    const start = performance.now();
    const from = parseFloat(video.style.opacity) || 0;
    function tick(now) {
      const p = Math.min((now - start) / duration, 1);
      video.style.opacity = from + (target - from) * p;
      if (p < 1) rafRef.current = requestAnimationFrame(tick);
    }
    rafRef.current = requestAnimationFrame(tick);
  }, []);

  useEffect(() => {
    const v = videoRef.current;
    if (!v) return;
    v.style.opacity = 0;

    const onLoaded = () => { v.style.opacity = 0; v.play(); fadeTo(1, FADE_MS); };
    const onTime = () => {
      if (!fadingOutRef.current && v.duration && v.duration - v.currentTime <= FADE_OUT_LEAD && v.duration - v.currentTime > 0) {
        fadingOutRef.current = true;
        fadeTo(0, FADE_MS);
      }
    };
    const onEnded = () => {
      v.style.opacity = 0;
      setTimeout(() => { v.currentTime = 0; v.play(); fadingOutRef.current = false; fadeTo(1, FADE_MS); }, 100);
    };

    v.addEventListener('loadeddata', onLoaded);
    v.addEventListener('timeupdate', onTime);
    v.addEventListener('ended', onEnded);
    return () => {
      cancelAnimationFrame(rafRef.current);
      v.removeEventListener('loadeddata', onLoaded);
      v.removeEventListener('timeupdate', onTime);
      v.removeEventListener('ended', onEnded);
    };
  }, [fadeTo]);

  return <video ref={videoRef} src={src} autoPlay muted playsInline preload="auto" loop={false} className={className} style={{ ...style, opacity: 0 }} />;
}

// ── ArrowUpRight icon ────────────────────────────────────────────────────────
function ArrowUpRight({ size = 18 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M7 17L17 7"/><path d="M7 7h10v10"/>
    </svg>
  );
}

// ── CheckIcon ────────────────────────────────────────────────────────────────
function CheckIcon({ size = 18 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  );
}

// ── UploadBar ────────────────────────────────────────────────────────────────
function UploadBar({ pct, text, visible }) {
  if (!visible) return null;
  return (
    <div className="mt-3">
      <div className="prog-track"><div className="prog-fill" style={{ width: pct + '%' }} /></div>
      <p className="text-white/50 text-xs font-body mt-1.5">{text}</p>
    </div>
  );
}

// ── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [jobId] = useState(() => 'job_' + Math.random().toString(36).slice(2,10) + Date.now());
  const [videoReady, setVideoReady] = useState(false);
  const [refReady, setRefReady] = useState(false);
  const [processing, setProcessing] = useState(false);
  const [videoName, setVideoName] = useState('');
  const [refName, setRefName] = useState('');
  const [refPreview, setRefPreview] = useState('');
  const [videoUpload, setVideoUpload] = useState({ pct: 0, text: '', visible: false });
  const [progress, setProgress] = useState({ pct: 0, text: '', visible: false });
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');
  const [showBanner, setShowBanner] = useState(false);
  const pollRef = useRef(null);
  const startedRef = useRef(false);

  // notification permission
  useEffect(() => {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }, []);

  function notify(title, body) {
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification(title, { body, icon: 'https://em-content.zobj.net/source/google/387/clapper-board_1f3ac.png' });
    }
  }

  // reconnect on load
  useEffect(() => {
    const saved = localStorage.getItem('clipcut_job_id');
    if (!saved) return;
    fetch(`${BACKEND}/status/${saved}`).then(r => r.json()).then(d => {
      if (d.status === 'done') {
        setResult(d.stats);
        setProgress({ pct: 100, text: 'Done!', visible: false });
      } else if (d.status === 'processing' || d.status === 'queued') {
        setProcessing(true);
        setProgress({ pct: d.progress, text: d.status_text, visible: true });
        pollRef.current = setInterval(() => pollStatus(saved), 2500);
      } else {
        localStorage.removeItem('clipcut_job_id');
      }
    }).catch(() => localStorage.removeItem('clipcut_job_id'));
  }, []);

  async function uploadChunked(file, fileType, onProgress) {
    const total = Math.ceil(file.size / CHUNK);
    for (let i = 0; i < total; i++) {
      const blob = file.slice(i * CHUNK, Math.min((i+1)*CHUNK, file.size));
      const fd = new FormData();
      fd.append('chunk', blob, file.name);
      const url = `${BACKEND}/upload-chunk?job_id=${jobId}&chunk_index=${i}&total_chunks=${total}&file_type=${fileType}`;
      const resp = await fetch(url, { method: 'POST', body: fd });
      if (!resp.ok) throw new Error(`Upload failed at chunk ${i}`);
      onProgress(Math.round(((i+1)/total)*100));
    }
  }

  async function handleVideo(e) {
    const file = e.target.files[0];
    if (!file) return;
    setVideoReady(false);
    setVideoName(file.name.length > 30 ? file.name.slice(0,27)+'...' : file.name);
    setVideoUpload({ pct: 0, text: 'Uploading...', visible: true });
    try {
      await uploadChunked(file, 'video', pct => {
        setVideoUpload({ pct, text: `Uploading ${pct}%`, visible: true });
      });
      setVideoUpload({ pct: 100, text: 'Upload complete ✓', visible: true });
      setVideoReady(true);
    } catch(err) {
      setError('Video upload failed: ' + err.message);
    }
  }

  async function handleRef(e) {
    const file = e.target.files[0];
    if (!file) return;
    setRefReady(false);
    setRefName(file.name.length > 24 ? file.name.slice(0,21)+'...' : file.name);
    const reader = new FileReader();
    reader.onload = ev => setRefPreview(ev.target.result);
    reader.readAsDataURL(file);
    try {
      const total = Math.ceil(file.size / CHUNK);
      for (let i = 0; i < total; i++) {
        const blob = file.slice(i*CHUNK, Math.min((i+1)*CHUNK, file.size));
        const fd = new FormData();
        fd.append('chunk', blob, file.name);
        await fetch(`${BACKEND}/upload-chunk?job_id=${jobId}&chunk_index=${i}&total_chunks=${total}&file_type=reference`, { method: 'POST', body: fd });
      }
      setRefReady(true);
    } catch(err) {
      setError('Photo upload failed: ' + err.message);
    }
  }

  useEffect(() => {
    if (videoReady && refReady && !startedRef.current) {
      startedRef.current = true;
      setShowBanner(true);
      setTimeout(() => { setShowBanner(false); startExtraction(); }, 1500);
    }
  }, [videoReady, refReady]);

  async function startExtraction() {
    setError('');
    setResult(null);
    setProcessing(true);
    setProgress({ pct: 0, text: 'Starting...', visible: true });
    localStorage.setItem('clipcut_job_id', jobId);
    try {
      const resp = await fetch(`${BACKEND}/process?job_id=${jobId}`, { method: 'POST' });
      if (!resp.ok) { const d = await resp.json(); throw new Error(d.detail || 'Failed to start'); }
      pollRef.current = setInterval(() => pollStatus(jobId), 2500);
    } catch(err) {
      setError(err.message);
      setProcessing(false);
      setProgress(p => ({ ...p, visible: false }));
    }
  }

  async function pollStatus(jid) {
    try {
      const resp = await fetch(`${BACKEND}/status/${jid}`);
      if (!resp.ok) return;
      const d = await resp.json();
      setProgress({ pct: d.progress, text: d.status_text, visible: true });
      if (d.status === 'done') {
        clearInterval(pollRef.current);
        localStorage.removeItem('clipcut_job_id');
        setProgress({ pct: 100, text: 'Done!', visible: false });
        setProcessing(false);
        setResult(d.stats);
        notify('✅ ClipCut — Video Ready!', `Extracted ${d.stats?.extracted}s across ${d.stats?.clips} scenes.`);
      } else if (d.status === 'failed') {
        clearInterval(pollRef.current);
        localStorage.removeItem('clipcut_job_id');
        setError(d.error || 'Processing failed.');
        setProcessing(false);
        setProgress(p => ({ ...p, visible: false }));
        notify('❌ ClipCut Failed', d.error || 'Something went wrong.');
      }
    } catch(e) {}
  }

  function reset() {
    fetch(`${BACKEND}/job/${jobId}`, { method: 'DELETE' }).catch(() => {});
    clearInterval(pollRef.current);
    localStorage.removeItem('clipcut_job_id');
    window.location.reload();
  }

  const bothUploaded = videoReady && refReady;

  return (
    <div className="relative min-h-screen overflow-hidden bg-black">

      {/* ── Background Video ── */}
      <FadingVideo
        src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_080021_d598092b-c4c2-4e53-8e46-94cf9064cd50.mp4"
        className="absolute left-1/2 top-0 -translate-x-1/2 object-cover object-top z-0"
        style={{ width: '120%', height: '120%' }}
      />

      {/* ── Dark gradient overlay for readability ── */}
      <div className="absolute inset-0 z-0" style={{ background: 'linear-gradient(to bottom, rgba(0,0,0,0.35) 0%, rgba(0,0,0,0.55) 60%, rgba(0,0,0,0.8) 100%)' }} />

      {/* ── Content ── */}
      <div className="relative z-10 min-h-screen flex flex-col">

        {/* Navbar */}
        <nav className="flex items-center justify-between px-6 py-5">
          <div className="liquid-glass w-12 h-12 rounded-full flex items-center justify-center">
            <span className="font-heading italic text-white text-xl leading-none">c</span>
          </div>
          <div className="liquid-glass rounded-full px-4 py-2 hidden md:flex items-center gap-1">
            <span className="text-white/70 text-sm font-body px-3 py-1.5">Home</span>
            <span className="text-white/70 text-sm font-body px-3 py-1.5">How it works</span>
            <span className="text-white/70 text-sm font-body px-3 py-1.5">Pricing</span>
          </div>
          <div className="w-12 h-12 opacity-0" />
        </nav>

        {/* Hero text */}
        <div className="flex flex-col items-center text-center px-5 pt-4 pb-8">
          <motion.div
            initial={{ opacity: 0, y: 16, filter: 'blur(10px)' }}
            animate={{ opacity: 1, y: 0, filter: 'blur(0px)' }}
            transition={{ duration: 0.6, delay: 0.2 }}
            className="liquid-glass rounded-full px-4 py-1.5 mb-5 flex items-center gap-2"
          >
            <span className="bg-white text-black text-xs font-semibold px-2.5 py-0.5 rounded-full font-body">New</span>
            <span className="text-white/80 text-xs font-body pr-1">AI-powered person extraction</span>
          </motion.div>

          <motion.h1
            initial={{ opacity: 0, y: 20, filter: 'blur(10px)' }}
            animate={{ opacity: 1, y: 0, filter: 'blur(0px)' }}
            transition={{ duration: 0.7, delay: 0.4 }}
            className="font-heading italic text-white text-5xl md:text-6xl lg:text-7xl leading-[0.85] tracking-[-3px] max-w-lg"
          >
            Extract Anyone From Any Video
          </motion.h1>

          <motion.p
            initial={{ opacity: 0, y: 16, filter: 'blur(8px)' }}
            animate={{ opacity: 1, y: 0, filter: 'blur(0px)' }}
            transition={{ duration: 0.6, delay: 0.65 }}
            className="text-white/70 text-sm md:text-base font-body font-light mt-4 max-w-sm leading-relaxed"
          >
            Upload a video and a reference photo. Our AI finds that person across every scene and delivers a clean 9:16 clip — automatically.
          </motion.p>
        </div>

        {/* ── Upload Cards ── */}
        <div className="flex-1 flex flex-col px-5 pb-8 max-w-lg mx-auto w-full gap-4">

          {/* Auto-start banner */}
          <AnimatePresence>
            {showBanner && (
              <motion.div
                initial={{ opacity: 0, y: -8 }}
                animate={{ opacity: 1, y: 0 }}
                exit={{ opacity: 0, y: -8 }}
                className="liquid-glass-strong rounded-2xl px-5 py-3 text-center"
              >
                <span className="text-white text-sm font-body tracking-wide">⚡ Both files ready — extracting now...</span>
              </motion.div>
            )}
          </AnimatePresence>

          {/* Error */}
          <AnimatePresence>
            {error && (
              <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                className="liquid-glass rounded-2xl px-5 py-4 border border-red-500/30">
                <p className="text-red-400 text-sm font-body">⚠ {error}</p>
              </motion.div>
            )}
          </AnimatePresence>

          {/* Video Upload */}
          <motion.div
            initial={{ opacity: 0, y: 24, filter: 'blur(8px)' }}
            animate={{ opacity: 1, y: 0, filter: 'blur(0px)' }}
            transition={{ duration: 0.6, delay: 0.8 }}
          >
            <label className={`liquid-glass upload-zone rounded-[1.5rem] p-6 flex flex-col items-center text-center block ${videoName ? 'filled' : ''}`}>
              <input type="file" accept="video/*" className="hidden" onChange={handleVideo} />
              <div className="liquid-glass w-12 h-12 rounded-2xl flex items-center justify-center mb-4">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                  <rect x="2" y="2" width="20" height="20" rx="3"/><polygon points="10 8 16 12 10 16 10 8" fill="white" stroke="none"/>
                </svg>
              </div>
              <p className="font-heading italic text-white text-2xl leading-none mb-1">
                {videoName || 'Select Video'}
              </p>
              <p className="text-white/50 text-xs font-body">MP4, MOV, AVI — any size</p>
              {videoReady && (
                <span className="mt-3 flex items-center gap-1.5 text-white/80 text-xs font-body">
                  <CheckIcon size={14} /> Ready
                </span>
              )}
              <UploadBar pct={videoUpload.pct} text={videoUpload.text} visible={videoUpload.visible && !videoReady} />
            </label>
          </motion.div>

          {/* Reference Photo Upload */}
          <motion.div
            initial={{ opacity: 0, y: 24, filter: 'blur(8px)' }}
            animate={{ opacity: 1, y: 0, filter: 'blur(0px)' }}
            transition={{ duration: 0.6, delay: 0.95 }}
          >
            <label className={`liquid-glass upload-zone rounded-[1.5rem] p-5 flex items-center gap-4 block ${refName ? 'filled' : ''}`}>
              <input type="file" accept="image/*" className="hidden" onChange={handleRef} />
              {refPreview
                ? <img src={refPreview} className="w-14 h-14 rounded-full object-cover flex-shrink-0" style={{ border: '1.5px solid rgba(255,255,255,0.3)' }} alt="ref" />
                : <div className="liquid-glass w-14 h-14 rounded-full flex items-center justify-center flex-shrink-0 text-2xl">👤</div>
              }
              <div className="flex-1 text-left">
                <p className="font-heading italic text-white text-xl leading-none">
                  {refName || 'Reference Photo'}
                </p>
                <p className="text-white/50 text-xs font-body mt-1">Clear front-facing photo of person</p>
                {refReady && (
                  <span className="mt-1.5 flex items-center gap-1.5 text-white/80 text-xs font-body">
                    <CheckIcon size={13} /> Ready
                  </span>
                )}
              </div>
              <ArrowUpRight size={16} />
            </label>
          </motion.div>

          {/* Processing Progress */}
          <AnimatePresence>
            {progress.visible && (
              <motion.div
                initial={{ opacity: 0, y: 12 }}
                animate={{ opacity: 1, y: 0 }}
                exit={{ opacity: 0 }}
                className="liquid-glass-strong rounded-2xl p-5"
              >
                <div className="flex justify-between items-center mb-3">
                  <p className="text-white/80 text-sm font-body pulsing">{progress.text}</p>
                  <p className="text-white text-sm font-body font-medium">{progress.pct}%</p>
                </div>
                <div className="prog-track"><div className="prog-fill" style={{ width: progress.pct + '%' }} /></div>
              </motion.div>
            )}
          </AnimatePresence>

          {/* Result Card */}
          <AnimatePresence>
            {result && (
              <motion.div
                initial={{ opacity: 0, y: 16, filter: 'blur(8px)' }}
                animate={{ opacity: 1, y: 0, filter: 'blur(0px)' }}
                exit={{ opacity: 0 }}
                className="liquid-glass-strong rounded-[1.5rem] p-6"
              >
                <p className="font-heading italic text-white text-2xl mb-5 leading-none">Person extracted</p>

                {/* Stats */}
                <div className="grid grid-cols-3 gap-3 mb-5">
                  {[
                    { val: result?.duration + 's', label: 'Original' },
                    { val: result?.extracted + 's', label: 'Extracted' },
                    { val: result?.clips, label: 'Scenes' },
                  ].map(s => (
                    <div key={s.label} className="liquid-glass rounded-2xl p-3 text-center">
                      <p className="font-heading italic text-white text-2xl leading-none tracking-tight">{s.val}</p>
                      <p className="text-white/50 text-xs font-body mt-1">{s.label}</p>
                    </div>
                  ))}
                </div>

                {/* Download */}
                <button
                  onClick={() => window.open(`${BACKEND}/download/${jobId}`, '_blank')}
                  className="liquid-glass-strong w-full rounded-full py-3 flex items-center justify-center gap-2 text-white font-body font-medium text-sm mb-3"
                >
                  Download Video <ArrowUpRight size={15} />
                </button>

                <button onClick={reset} className="w-full text-white/40 text-xs font-body py-2 hover:text-white/70 transition-colors">
                  Process another video
                </button>
              </motion.div>
            )}
          </AnimatePresence>

          {/* Stats row when idle */}
          {!processing && !result && (
            <motion.div
              initial={{ opacity: 0 }}
              animate={{ opacity: 1 }}
              transition={{ delay: 1.2 }}
              className="flex gap-3 mt-2"
            >
              {[
                { val: '168s', label: 'Avg. extracted' },
                { val: '11', label: 'Scenes tracked' },
              ].map(s => (
                <div key={s.label} className="liquid-glass rounded-2xl p-4 flex-1 text-center">
                  <p className="font-heading italic text-white text-3xl leading-none tracking-tight">{s.val}</p>
                  <p className="text-white/50 text-xs font-body mt-1.5">{s.label}</p>
                </div>
              ))}
            </motion.div>
          )}
        </div>

        {/* Footer */}
        <div className="text-center pb-6 px-5">
          <p className="text-white/20 text-xs font-body tracking-widest">CLIPCUT AI — POWERED BY ARCFACE</p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
