<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FaceSwap — Vidix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#000;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;}
  ::selection{background:#EAECE9;color:#1C2E1E;}

  .lg{background:rgba(255,255,255,0.01);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);box-shadow:inset 0 1px 1px rgba(255,255,255,0.1);position:relative;overflow:hidden;}
  .lg::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1.4px;background:linear-gradient(180deg,rgba(255,255,255,0.45) 0%,rgba(255,255,255,0.15) 20%,rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,0.15) 80%,rgba(255,255,255,0.45) 100%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
  .lg-strong{background:rgba(255,255,255,0.04);backdrop-filter:blur(50px);-webkit-backdrop-filter:blur(50px);box-shadow:4px 4px 4px rgba(0,0,0,0.05),inset 0 1px 1px rgba(255,255,255,0.15);position:relative;overflow:hidden;}
  .lg-strong::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1.4px;background:linear-gradient(180deg,rgba(255,255,255,0.5) 0%,rgba(255,255,255,0.2) 20%,rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,0.2) 80%,rgba(255,255,255,0.5) 100%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}

  #bgvideo{position:fixed;left:50%;top:0;transform:translateX(-50%);width:120%;height:120%;object-fit:cover;object-position:top center;z-index:0;opacity:0;}
  .overlay{position:fixed;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0.5) 0%,rgba(0,0,0,0.65) 60%,rgba(0,0,0,0.88) 100%);z-index:1;}
  .page{position:relative;z-index:2;min-height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;padding:0 20px;}

  nav{display:flex;align-items:center;justify-content:space-between;padding:20px 0;}
  .back-btn{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;color:white;flex-shrink:0;}
  .tool-badge{background:rgba(255,255,255,0.06);border-radius:999px;padding:6px 16px;font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:2px;text-transform:uppercase;}

  .hero{padding:16px 0 28px;text-align:center;}
  h1{font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(2.6rem,9vw,3.8rem);font-weight:400;letter-spacing:-0.02em;line-height:0.9;color:white;margin-bottom:14px;text-transform:uppercase;}
  .sub{font-size:13px;color:rgba(255,255,255,0.5);font-weight:300;line-height:1.6;max-width:300px;margin:0 auto 6px;}
  .disclaimer{font-size:10px;color:rgba(255,255,255,0.25);margin-top:8px;font-style:italic;}

  .cards{display:flex;flex-direction:column;gap:12px;padding-bottom:32px;}

  /* upload zones */
  .upload-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .photo-zone{border-radius:18px;padding:18px 12px;cursor:pointer;text-align:center;position:relative;transition:box-shadow 0.2s;}
  .photo-zone:hover{box-shadow:inset 0 1px 1px rgba(255,255,255,0.2),0 0 0 1px rgba(255,255,255,0.12);}
  .photo-zone.filled{box-shadow:inset 0 1px 1px rgba(255,255,255,0.2),0 0 0 1px rgba(255,255,255,0.25);}
  .photo-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .photo-preview{width:100%;aspect-ratio:1;border-radius:12px;object-fit:cover;display:none;margin-bottom:8px;}
  .photo-placeholder{width:100%;aspect-ratio:1;border-radius:12px;background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:8px;}
  .photo-label{font-family:'Instrument Serif',serif;font-style:italic;font-size:1rem;color:white;line-height:1;margin-bottom:3px;}
  .photo-sub{font-size:10px;color:rgba(255,255,255,0.35);}
  .photo-check{font-size:10px;color:rgba(255,255,255,0.6);margin-top:4px;display:none;}
  .photo-zone.filled .photo-check{display:block;}

  /* arrow between */
  .swap-arrow{display:flex;align-items:center;justify-content:center;font-size:20px;color:rgba(255,255,255,0.3);padding:4px 0;}

  /* processing */
  .proc-card{border-radius:20px;padding:20px;display:none;}
  .proc-card.show{display:block;}
  .proc-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
  .proc-text{font-size:13px;color:rgba(255,255,255,0.7);font-family:'Inter',sans-serif;}
  .proc-pct{font-family:'Instrument Serif',serif;font-style:italic;font-size:18px;color:white;}
  .prog-track{height:2px;background:rgba(255,255,255,0.1);border-radius:99px;overflow:hidden;}
  .prog-fill{height:100%;background:white;border-radius:99px;transition:width 0.3s ease;width:0%;}

  /* error */
  .error-card{border-radius:16px;padding:14px 18px;border:1px solid rgba(255,80,80,0.3);background:rgba(255,60,60,0.06);display:none;}
  .error-card.show{display:block;}
  .error-text{font-size:12px;color:rgba(255,120,120,0.9);line-height:1.5;}

  /* result */
  .result-card{border-radius:24px;padding:20px;display:none;}
  .result-card.show{display:block;}
  .result-title{font-family:'Instrument Serif',serif;font-style:italic;font-size:1.6rem;color:white;margin-bottom:14px;}
  .result-img{width:100%;border-radius:16px;margin-bottom:16px;display:block;}
  .btn-download{width:100%;border-radius:999px;padding:14px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px;font-weight:500;color:white;cursor:pointer;border:none;background:transparent;margin-bottom:10px;font-family:'Inter',sans-serif;}
  .btn-download:hover{opacity:0.8;}
  .btn-reset{width:100%;background:transparent;border:none;color:rgba(255,255,255,0.3);font-size:12px;cursor:pointer;padding:8px;font-family:'Inter',sans-serif;transition:color 0.2s;}
  .btn-reset:hover{color:rgba(255,255,255,0.6);}

  footer{text-align:center;padding:16px 0 24px;font-size:10px;color:rgba(255,255,255,0.12);letter-spacing:3px;text-transform:uppercase;}

  .fade-in{opacity:0;transform:translateY(18px);filter:blur(6px);animation:fadeUp 0.6s ease forwards;}
  @keyframes fadeUp{to{opacity:1;transform:translateY(0);filter:blur(0);}}
  .d1{animation-delay:0.1s}.d2{animation-delay:0.25s}.d3{animation-delay:0.4s}.d4{animation-delay:0.55s}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.45}}
  .pulsing{animation:pulse 1.8s infinite;}
</style>
</head>
<body>
<video id="bgvideo" autoplay muted playsinline preload="auto"></video>
<div class="overlay"></div>
<div class="page">

  <nav class="fade-in d1">
    <a href="index.html" class="back-btn lg">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    </a>
    <div class="tool-badge">FaceSwap</div>
    <div style="width:46px"></div>
  </nav>

  <div class="hero">
    <h1 class="fade-in d2">Swap<br>Any Face</h1>
    <p class="sub fade-in d3">Upload a source face and a target photo. AI replaces the face instantly.</p>
    <p class="disclaimer fade-in d3">For creative use only. Do not use on real people without consent.</p>
  </div>

  <div class="cards">

    <!-- Error -->
    <div class="error-card" id="errorCard"><p class="error-text" id="errorText"></p></div>

    <!-- Upload pair -->
    <div class="upload-pair fade-in d3">
      <!-- Source face -->
      <label class="photo-zone lg" id="sourceZone">
        <input type="file" accept="image/*" id="sourceInput">
        <img class="photo-preview" id="sourcePreview" alt="source">
        <div class="photo-placeholder" id="sourcePlaceholder">👤</div>
        <div class="photo-label">Source Face</div>
        <div class="photo-sub">The face to use</div>
        <div class="photo-check">✓ Ready</div>
      </label>

      <!-- Target photo -->
      <label class="photo-zone lg" id="targetZone">
        <input type="file" accept="image/*" id="targetInput">
        <img class="photo-preview" id="targetPreview" alt="target">
        <div class="photo-placeholder" id="targetPlaceholder">🖼️</div>
        <div class="photo-label">Target Photo</div>
        <div class="photo-sub">Where to swap</div>
        <div class="photo-check">✓ Ready</div>
      </label>
    </div>

    <!-- Arrow indicator -->
    <div class="swap-arrow fade-in d4" id="swapArrow" style="display:none;">
      ⚡ Both ready — swapping automatically...
    </div>

    <!-- Processing -->
    <div class="proc-card lg-strong" id="procCard">
      <div class="proc-row">
        <p class="proc-text pulsing" id="procText">Starting...</p>
        <p class="proc-pct" id="procPct">0%</p>
      </div>
      <div class="prog-track"><div class="prog-fill" id="procFill"></div></div>
    </div>

    <!-- Result -->
    <div class="result-card lg-strong" id="resultCard">
      <div class="result-title">Face swapped ✓</div>
      <img class="result-img" id="resultImg" alt="Result">
      <button class="btn-download lg-strong" id="downloadBtn">
        Download Result →
      </button>
      <button class="btn-reset" id="resetBtn">Try another swap</button>
    </div>

  </div>
  <footer>Vidix — AI Video Suite</footer>
</div>

<script>
  const BACKEND = "https://runitdamar-clipcut-backend.hf.space";
  let jobId = 'fs_' + Math.random().toString(36).slice(2,10) + Date.now();
  let sourceReady = false, targetReady = false;
  let processing = false, pollTimer = null;
  let sourceFile = null, targetFile = null;

  // bg video
  (function(){
    const v = document.getElementById('bgvideo');
    const FADE_MS=500,LEAD=0.55; let rafId=null,fadingOut=false;
    function fadeTo(t,ms){cancelAnimationFrame(rafId);const s=performance.now(),f=parseFloat(v.style.opacity)||0;function tick(n){const p=Math.min((n-s)/ms,1);v.style.opacity=f+(t-f)*p;if(p<1)rafId=requestAnimationFrame(tick);}rafId=requestAnimationFrame(tick);}
    v.src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260418_080021_d598092b-c4c2-4e53-8e46-94cf9064cd50.mp4";
    v.addEventListener('loadeddata',()=>{v.style.opacity=0;v.play();fadeTo(1,FADE_MS);});
    v.addEventListener('timeupdate',()=>{if(!fadingOut&&v.duration&&v.duration-v.currentTime<=LEAD&&v.duration-v.currentTime>0){fadingOut=true;fadeTo(0,FADE_MS);}});
    v.addEventListener('ended',()=>{v.style.opacity=0;setTimeout(()=>{v.currentTime=0;v.play();fadingOut=false;fadeTo(1,FADE_MS);},100);});
  })();

  // source input
  document.getElementById('sourceInput').addEventListener('change', function() {
    const file = this.files[0]; if (!file) return;
    sourceFile = file; sourceReady = false;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('sourcePreview').src = e.target.result;
      document.getElementById('sourcePreview').style.display = 'block';
      document.getElementById('sourcePlaceholder').style.display = 'none';
    };
    reader.readAsDataURL(file);
    document.getElementById('sourceZone').classList.add('filled');
    sourceReady = true;
    checkReady();
  });

  // target input
  document.getElementById('targetInput').addEventListener('change', function() {
    const file = this.files[0]; if (!file) return;
    targetFile = file; targetReady = false;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('targetPreview').src = e.target.result;
      document.getElementById('targetPreview').style.display = 'block';
      document.getElementById('targetPlaceholder').style.display = 'none';
    };
    reader.readAsDataURL(file);
    document.getElementById('targetZone').classList.add('filled');
    targetReady = true;
    checkReady();
  });

  function checkReady() {
    if (sourceReady && targetReady && !processing) {
      processing = true;
      const arrow = document.getElementById('swapArrow');
      arrow.style.display = 'block';
      setTimeout(() => { arrow.style.display = 'none'; startSwap(); }, 1500);
    }
  }

  async function startSwap() {
    hideError();
    document.getElementById('resultCard').classList.remove('show');
    document.getElementById('procCard').classList.add('show');
    setProc(0, 'Uploading photos...');

    try {
      const fd = new FormData();
      fd.append('source', sourceFile, 'source.jpg');
      fd.append('target', targetFile, 'target.jpg');

      const r = await fetch(`${BACKEND}/faceswap?job_id=${jobId}`, { method: 'POST', body: fd });
      if (!r.ok) { const d = await r.json(); throw new Error(d.detail || 'Failed to start'); }
      pollTimer = setInterval(poll, 2000);
    } catch(e) {
      showError(e.message);
      document.getElementById('procCard').classList.remove('show');
      processing = false;
    }
  }

  async function poll() {
    try {
      const r = await fetch(`${BACKEND}/faceswap/status/${jobId}`);
      if (!r.ok) return;
      const d = await r.json();
      setProc(d.progress, d.status_text);
      if (d.status === 'done') {
        clearInterval(pollTimer);
        document.getElementById('procCard').classList.remove('show');
        showResult();
      } else if (d.status === 'failed') {
        clearInterval(pollTimer);
        document.getElementById('procCard').classList.remove('show');
        showError(d.error || 'Face swap failed.');
        processing = false;
      }
    } catch(e) {}
  }

  function setProc(pct, text) {
    document.getElementById('procFill').style.width = pct + '%';
    document.getElementById('procText').textContent = text || 'Processing...';
    document.getElementById('procPct').textContent = pct + '%';
  }

  function showResult() {
    document.getElementById('resultCard').classList.add('show');
    // Show result image
    const img = document.getElementById('resultImg');
    img.src = `${BACKEND}/faceswap/download/${jobId}?t=${Date.now()}`;
    img.style.display = 'block';
  }

  document.getElementById('downloadBtn').addEventListener('click', () => {
    window.open(`${BACKEND}/faceswap/download/${jobId}`, '_blank');
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    fetch(`${BACKEND}/faceswap/job/${jobId}`, { method: 'DELETE' }).catch(() => {});
    clearInterval(pollTimer);
    window.location.reload();
  });

  function showError(msg) {
    document.getElementById('errorCard').classList.add('show');
    document.getElementById('errorText').textContent = '⚠ ' + msg;
  }
  function hideError() { document.getElementById('errorCard').classList.remove('show'); }
</script>
</body>
</html>
