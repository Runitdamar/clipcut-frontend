<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VidPlay — Vidix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#000;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;}

  .lg{background:rgba(255,255,255,0.01);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);box-shadow:inset 0 1px 1px rgba(255,255,255,0.1);position:relative;overflow:hidden;}
  .lg::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1.4px;background:linear-gradient(180deg,rgba(255,255,255,0.45) 0%,rgba(255,255,255,0.15) 20%,rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,0.15) 80%,rgba(255,255,255,0.45) 100%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
  .lg-strong{background:rgba(255,255,255,0.06);backdrop-filter:blur(50px);-webkit-backdrop-filter:blur(50px);box-shadow:inset 0 1px 1px rgba(255,255,255,0.15);position:relative;overflow:hidden;}
  .lg-strong::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1.4px;background:linear-gradient(180deg,rgba(255,255,255,0.5) 0%,rgba(255,255,255,0.2) 20%,rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,0.2) 80%,rgba(255,255,255,0.5) 100%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}

  /* nav */
  nav{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0;}
  .back-btn{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0;}
  .tool-badge{background:rgba(255,255,255,0.06);border-radius:999px;padding:6px 16px;font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:2px;text-transform:uppercase;}

  /* page */
  .page{max-width:520px;margin:0 auto;padding:0 20px 40px;}

  /* hero */
  .hero{padding:20px 0 24px;text-align:center;}
  h1{font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(2.4rem,8vw,3.4rem);font-weight:400;letter-spacing:-0.02em;line-height:0.9;color:white;margin-bottom:12px;text-transform:uppercase;}
  .sub{font-size:13px;color:rgba(255,255,255,0.5);font-weight:300;line-height:1.6;max-width:300px;margin:0 auto;}

  /* url input */
  .input-section{margin-bottom:14px;}
  .section-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:8px;font-family:'Inter',sans-serif;}
  .url-row{display:flex;align-items:center;gap:8px;border-radius:14px;padding:12px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);transition:border-color 0.2s;}
  .url-row:focus-within{border-color:rgba(255,255,255,0.2);}
  .url-input{flex:1;background:transparent;border:none;outline:none;color:white;font-size:13px;font-family:'Inter',sans-serif;}
  .url-input::placeholder{color:rgba(255,255,255,0.2);}
  .add-btn{background:rgba(255,255,255,0.1);border:none;border-radius:99px;padding:6px 14px;color:white;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;transition:background 0.2s;}
  .add-btn:hover{background:rgba(255,255,255,0.18);}

  /* playlist */
  .playlist{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .playlist-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);transition:all 0.2s;cursor:pointer;}
  .playlist-item:hover{background:rgba(255,255,255,0.06);}
  .playlist-item.active{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.2);}
  .playlist-item.loading{opacity:0.6;}
  .playlist-item.error{border-color:rgba(255,80,80,0.3);background:rgba(255,60,60,0.04);}
  .playlist-item.done{border-color:rgba(100,255,100,0.2);}
  .item-num{font-size:11px;color:rgba(255,255,255,0.25);width:16px;flex-shrink:0;text-align:center;}
  .item-text{flex:1;font-size:12px;color:rgba(255,255,255,0.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .item-status{font-size:14px;flex-shrink:0;}
  .item-remove{background:none;border:none;color:rgba(255,255,255,0.2);cursor:pointer;font-size:16px;padding:0 2px;flex-shrink:0;transition:color 0.2s;}
  .item-remove:hover{color:rgba(255,80,80,0.8);}

  /* play button */
  .play-all-btn{width:100%;border-radius:999px;padding:14px;background:white;color:black;border:none;font-family:'Instrument Serif',serif;font-style:italic;font-size:1.2rem;cursor:pointer;transition:opacity 0.2s;margin-bottom:14px;}
  .play-all-btn:hover{opacity:0.88;}
  .play-all-btn:disabled{opacity:0.3;cursor:not-allowed;}

  /* player */
  .player-section{display:none;margin-bottom:14px;}
  .player-section.show{display:block;}

  .player-wrap{border-radius:18px;overflow:hidden;background:#000;position:relative;aspect-ratio:16/9;margin-bottom:10px;}
  .player-wrap video{width:100%;height:100%;display:block;object-fit:contain;}

  /* loading overlay */
  .player-loading{position:absolute;inset:0;background:rgba(0,0,0,0.7);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
  .player-loading.hide{display:none;}
  .spinner{width:36px;height:36px;border:2px solid rgba(255,255,255,0.1);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-text{font-size:12px;color:rgba(255,255,255,0.6);}
  .loading-prog{font-size:11px;color:rgba(255,255,255,0.35);}

  /* player controls */
  .player-controls{border-radius:16px;padding:14px 16px;}

  /* progress */
  .progress-wrap{margin-bottom:12px;}
  .progress-bar{width:100%;height:3px;background:rgba(255,255,255,0.1);border-radius:99px;cursor:pointer;position:relative;}
  .progress-fill{height:100%;background:white;border-radius:99px;width:0%;transition:width 0.1s linear;pointer-events:none;}
  .time-row{display:flex;justify-content:space-between;margin-top:5px;}
  .time-label{font-size:10px;color:rgba(255,255,255,0.35);font-family:'Inter',sans-serif;}

  /* buttons row */
  .ctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .ctrl-btn{background:rgba(255,255,255,0.06);border:none;border-radius:99px;padding:8px 14px;color:white;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;transition:background 0.2s;white-space:nowrap;}
  .ctrl-btn:hover{background:rgba(255,255,255,0.12);}
  .ctrl-btn.active{background:white;color:black;}
  .ctrl-btn-icon{background:rgba(255,255,255,0.06);border:none;border-radius:50%;width:36px;height:36px;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s;font-size:16px;flex-shrink:0;}
  .ctrl-btn-icon:hover{background:rgba(255,255,255,0.12);}
  .spacer{flex:1;}

  /* nav row */
  .nav-row{display:flex;align-items:center;gap:8px;}
  .nav-info{flex:1;text-align:center;}
  .nav-info-title{font-size:11px;color:rgba(255,255,255,0.5);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .nav-info-count{font-size:10px;color:rgba(255,255,255,0.25);margin-top:2px;}

  /* speed */
  .speed-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
  .speed-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:99px;padding:5px 12px;color:rgba(255,255,255,0.5);cursor:pointer;font-size:11px;font-family:'Inter',sans-serif;transition:all 0.2s;}
  .speed-btn:hover{background:rgba(255,255,255,0.1);color:white;}
  .speed-btn.active{background:white;color:black;border-color:white;}

  /* volume */
  .vol-row{display:flex;align-items:center;gap:8px;}
  .vol-icon{font-size:14px;color:rgba(255,255,255,0.4);}
  .vol-slider{flex:1;-webkit-appearance:none;appearance:none;height:2px;background:rgba(255,255,255,0.1);border-radius:99px;outline:none;cursor:pointer;}
  .vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:white;cursor:pointer;}

  /* download btn */
  .dl-btn{width:100%;border-radius:99px;padding:12px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;font-weight:500;color:white;cursor:pointer;border:none;background:transparent;font-family:'Inter',sans-serif;margin-top:8px;}
  .dl-btn:hover{opacity:0.7;}

  /* error */
  .err-card{border-radius:14px;padding:12px 16px;border:1px solid rgba(255,80,80,0.3);background:rgba(255,60,60,0.06);display:none;margin-bottom:10px;}
  .err-card.show{display:block;}
  .err-text{font-size:12px;color:rgba(255,120,120,0.9);line-height:1.5;}

  footer{text-align:center;padding:16px 0 24px;font-size:10px;color:rgba(255,255,255,0.1);letter-spacing:3px;text-transform:uppercase;}

  .fade-in{opacity:0;transform:translateY(14px);animation:fadeUp 0.5s ease forwards;}
  @keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
  .d1{animation-delay:0.1s}.d2{animation-delay:0.2s}.d3{animation-delay:0.3s}.d4{animation-delay:0.42s}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .pulsing{animation:pulse 1.6s infinite;}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="back-btn lg">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
  </a>
  <div class="tool-badge">VidPlay</div>
  <div style="width:46px"></div>
</nav>

<div class="page">
  <div class="hero">
    <h1 class="fade-in d1">Play<br>Any Video</h1>
    <p class="sub fade-in d2">Paste links from any platform. Plays directly or downloads and plays — no ads, ever.</p>
  </div>

  <!-- URL Input -->
  <div class="input-section fade-in d3">
    <div class="section-label">Video Links</div>
    <div class="url-row">
      <input class="url-input" id="urlInput" type="url" placeholder="Paste any video link...">
      <button class="add-btn" id="addBtn">Add</button>
    </div>
    <div style="font-size:10px;color:rgba(255,255,255,0.2);margin-top:6px;">Instagram · YouTube · Twitter/X · Reddit · Direct .mp4 links</div>
  </div>

  <!-- Error -->
  <div class="err-card" id="errCard"><p class="err-text" id="errText"></p></div>

  <!-- Playlist -->
  <div class="playlist" id="playlist"></div>

  <!-- Play button -->
  <button class="play-all-btn" id="playBtn" disabled>Play</button>

  <!-- Player -->
  <div class="player-section" id="playerSection">

    <!-- Video -->
    <div class="player-wrap lg">
      <video id="videoEl" playsinline preload="metadata"></video>
      <div class="player-loading" id="playerLoading">
        <div class="spinner"></div>
        <div class="loading-text pulsing" id="loadingText">Loading video...</div>
        <div class="loading-prog" id="loadingProg"></div>
      </div>
    </div>

    <!-- Controls -->
    <div class="player-controls lg-strong fade-in">

      <!-- Progress -->
      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-row">
          <span class="time-label" id="timeNow">0:00</span>
          <span class="time-label" id="timeDur">0:00</span>
        </div>
      </div>

      <!-- Main controls -->
      <div class="ctrl-row">
        <button class="ctrl-btn-icon" id="prevBtn" title="Previous">⏮</button>
        <button class="ctrl-btn-icon" id="playPauseBtn" title="Play/Pause">▶</button>
        <button class="ctrl-btn-icon" id="nextBtn" title="Next">⏭</button>
        <div class="spacer"></div>
        <button class="ctrl-btn-icon" id="pipBtn" title="Picture in Picture">⧉</button>
        <button class="ctrl-btn-icon" id="fsBtn" title="Fullscreen">⛶</button>
      </div>

      <!-- Nav info -->
      <div class="nav-row" style="margin-bottom:10px;">
        <div class="nav-info">
          <div class="nav-info-title" id="currentTitle">—</div>
          <div class="nav-info-count" id="currentCount"></div>
        </div>
      </div>

      <!-- Speed -->
      <div style="font-size:10px;color:rgba(255,255,255,0.25);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">Speed</div>
      <div class="speed-row" id="speedRow">
        <button class="speed-btn" data-speed="0.5">0.5×</button>
        <button class="speed-btn active" data-speed="1">1×</button>
        <button class="speed-btn" data-speed="1.25">1.25×</button>
        <button class="speed-btn" data-speed="1.5">1.5×</button>
        <button class="speed-btn" data-speed="2">2×</button>
      </div>

      <!-- Volume -->
      <div class="vol-row" style="margin-top:10px;">
        <span class="vol-icon" id="volIcon">🔊</span>
        <input class="vol-slider" type="range" id="volSlider" min="0" max="1" step="0.05" value="1">
      </div>

      <!-- Download -->
      <button class="dl-btn lg" id="dlBtn">⬇ Download current video</button>

    </div>
  </div>

  <footer>Vidix — AI Video Suite</footer>
</div>

<script>
const BACKEND = "https://runitdamar-clipcut-backend.hf.space";
const REPLIT  = "https://042d7c4e-b637-40b4-b7d2-d68beee78b78-00-3mdbyed99dkeg.pike.replit.dev";

// ── wake Replit ──────────────────────────────────────────────────────────────
// Replit sleeps when idle. This pings it directly so it's already warming up
// by the time the user actually needs a download fallback.
async function wakeReplit(silent) {
  for (let attempt = 0; attempt < 3; attempt++) {
    try {
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), silent ? 8000 : 6000);
      const r = await fetch(`${BACKEND}/wake`, { signal: ctrl.signal });
      clearTimeout(t);
      const d = await r.json();
      if (d.awake) return true;
    } catch (e) {}
    if (!silent) await sleep(3000);
    else break; // background ping — just try once, don't block anything
  }
  return false;
}
// Fire a quiet wake-up call as soon as the page loads, no UI shown.
wakeReplit(true);

let playlist = [];       // [{url, status, blobUrl, jobId}]
let currentIdx = -1;
let pollTimer = null;
let currentBlobUrl = null;

// ── helpers ──────────────────────────────────────────────────────────────────
function platformIcon(url) {
  if (url.includes('instagram')) return '📸';
  if (url.includes('youtube') || url.includes('youtu.be')) return '▶️';
  if (url.includes('twitter') || url.includes('x.com')) return '🐦';
  if (url.includes('reddit')) return '🤖';
  if (url.endsWith('.mp4') || url.endsWith('.webm') || url.endsWith('.mov')) return '🎬';
  return '🔗';
}

function cleanUrl(url) {
  try {
    const u = new URL(url);
    if (u.hostname.includes('instagram.com')) return 'https://www.instagram.com' + u.pathname.replace(/\/$/, '') + '/';
    ['utm_source','utm_medium','utm_campaign','igsh','si','s','t'].forEach(p => u.searchParams.delete(p));
    u.hash = '';
    return u.toString();
  } catch(e) { return url; }
}

function shortUrl(url) {
  try { const u = new URL(url); return u.hostname.replace('www.','') + u.pathname.slice(0,30); }
  catch(e) { return url.slice(0,40); }
}

function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// ── URL management ────────────────────────────────────────────────────────────
document.getElementById('addBtn').addEventListener('click', addUrl);
document.getElementById('urlInput').addEventListener('keydown', e => { if(e.key==='Enter') addUrl(); });

function addUrl() {
  const val = document.getElementById('urlInput').value.trim();
  if (!val) return;
  if (!val.startsWith('http')) { showErr('Please enter a valid URL starting with http'); return; }
  hideErr();
  const clean = cleanUrl(val);
  playlist.push({ url: clean, status: 'idle', blobUrl: null, jobId: null });
  document.getElementById('urlInput').value = '';
  renderPlaylist();
  document.getElementById('playBtn').disabled = false;
}

function renderPlaylist() {
  const el = document.getElementById('playlist');
  el.innerHTML = '';
  playlist.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'playlist-item' +
      (i === currentIdx ? ' active' : '') +
      (item.status === 'loading' ? ' loading' : '') +
      (item.status === 'error' ? ' error' : '') +
      (item.status === 'done' ? ' done' : '');
    div.innerHTML = `
      <span class="item-num">${platformIcon(item.url)}</span>
      <span class="item-text">${shortUrl(item.url)}</span>
      <span class="item-status">${
        item.status === 'loading' ? '⏳' :
        item.status === 'done' ? '✓' :
        item.status === 'error' ? '✗' :
        i === currentIdx ? '▶' : ''
      }</span>
      ${currentIdx === -1 ? `<button class="item-remove" onclick="removeItem(${i})">×</button>` : ''}
    `;
    div.onclick = (e) => { if (!e.target.classList.contains('item-remove')) playItem(i); };
    el.appendChild(div);
  });

  // update nav count
  document.getElementById('currentCount').textContent =
    currentIdx >= 0 ? `${currentIdx+1} of ${playlist.length}` : '';
}

function removeItem(i) {
  playlist.splice(i, 1);
  renderPlaylist();
  if (playlist.length === 0) document.getElementById('playBtn').disabled = true;
}

// ── Playback ──────────────────────────────────────────────────────────────────
document.getElementById('playBtn').addEventListener('click', () => {
  if (playlist.length > 0) playItem(0);
});

async function playItem(idx) {
  if (idx < 0 || idx >= playlist.length) return;
  currentIdx = idx;
  const item = playlist[idx];
  renderPlaylist();

  document.getElementById('playerSection').classList.add('show');
  document.getElementById('currentTitle').textContent = shortUrl(item.url);
  document.getElementById('currentCount').textContent = `${idx+1} of ${playlist.length}`;
  showLoading('Trying direct play...');

  // Try direct play first
  if (item.blobUrl) {
    loadVideo(item.blobUrl, idx);
    return;
  }

  // Check if it's a direct video URL
  const isDirectVideo = /\.(mp4|webm|mov|ogg|m4v)(\?.*)?$/i.test(item.url);
  if (isDirectVideo) {
    hideLoading();
    loadVideo(item.url, idx);
    item.status = 'done';
    renderPlaylist();
    return;
  }

  // Try direct embed
  const vid = document.getElementById('videoEl');
  vid.src = item.url;
  vid.load();

  const directResult = await new Promise(resolve => {
    const t = setTimeout(() => resolve('fail'), 4000);
    vid.oncanplay = () => { clearTimeout(t); resolve('ok'); };
    vid.onerror = () => { clearTimeout(t); resolve('fail'); };
  });

  if (directResult === 'ok') {
    hideLoading();
    vid.play();
    item.status = 'done';
    renderPlaylist();
    return;
  }

  // Fall back to download via Replit
  showLoading('Waking up download engine...');
  const awake = await wakeReplit(false);
  if (!awake) showLoading('Still waking up, this can take a moment...');
  showLoading('Downloading video...');
  item.status = 'loading';
  renderPlaylist();

  try {
    const jobId = 'vp_' + Math.random().toString(36).slice(2,8) + Date.now();
    item.jobId = jobId;

    const r = await fetch(`${BACKEND}/vidplay/fetch`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({url: item.url, job_id: jobId})
    });
    if (!r.ok) throw new Error('Download service unavailable');

    // Poll
    for (let attempt = 0; attempt < 100; attempt++) {
      await sleep(3000);
      const sr = await fetch(`${BACKEND}/vidplay/status/${jobId}`);
      if (!sr.ok) continue;
      const d = await sr.json();
      document.getElementById('loadingProg').textContent = d.status === 'processing' ? 'Downloading...' : '';
      if (d.status === 'done') break;
      if (d.status === 'failed') throw new Error(d.error || 'Download failed');
    }

    // Fetch as blob so we can play locally
    showLoading('Loading video...');
    const fr = await fetch(`${BACKEND}/vidplay/file/${jobId}`);
    if (!fr.ok) throw new Error('Could not fetch video file');
    const blob = await fr.blob();
    const blobUrl = URL.createObjectURL(blob);
    item.blobUrl = blobUrl;
    item.status = 'done';

    // Cleanup
    fetch(`${BACKEND}/vidplay/job/${jobId}`, {method:'DELETE'}).catch(()=>{});

    hideLoading();
    loadVideo(blobUrl, idx);
    renderPlaylist();

  } catch(e) {
    item.status = 'error';
    hideLoading();
    showErr(`Video ${idx+1} failed: ${e.message}`);
    renderPlaylist();
    // Auto skip to next
    setTimeout(() => { if (idx + 1 < playlist.length) playItem(idx+1); }, 2000);
  }
}

function loadVideo(src, idx) {
  const vid = document.getElementById('videoEl');
  vid.src = src;
  vid.load();
  vid.play().catch(()=>{});
  vid.onended = () => {
    if (idx + 1 < playlist.length) playItem(idx + 1);
  };
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── Video controls ────────────────────────────────────────────────────────────
const vid = document.getElementById('videoEl');

vid.addEventListener('timeupdate', () => {
  if (!vid.duration) return;
  const pct = (vid.currentTime / vid.duration) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('timeNow').textContent = fmtTime(vid.currentTime);
  document.getElementById('timeDur').textContent = fmtTime(vid.duration);
});

vid.addEventListener('play', () => { document.getElementById('playPauseBtn').textContent = '⏸'; });
vid.addEventListener('pause', () => { document.getElementById('playPauseBtn').textContent = '▶'; });

// Seek
document.getElementById('progressBar').addEventListener('click', function(e) {
  if (!vid.duration) return;
  const rect = this.getBoundingClientRect();
  vid.currentTime = ((e.clientX - rect.left) / rect.width) * vid.duration;
});

// Play/Pause
document.getElementById('playPauseBtn').addEventListener('click', () => {
  vid.paused ? vid.play() : vid.pause();
});

// Prev/Next
document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentIdx > 0) playItem(currentIdx - 1);
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (currentIdx < playlist.length - 1) playItem(currentIdx + 1);
});

// Speed
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    vid.playbackRate = parseFloat(this.dataset.speed);
  });
});

// Volume
document.getElementById('volSlider').addEventListener('input', function() {
  vid.volume = this.value;
  document.getElementById('volIcon').textContent = this.value == 0 ? '🔇' : this.value < 0.5 ? '🔉' : '🔊';
});

// PiP
document.getElementById('pipBtn').addEventListener('click', () => {
  if (document.pictureInPictureElement) document.exitPictureInPicture();
  else if (vid.requestPictureInPicture) vid.requestPictureInPicture().catch(()=>{});
});

// Fullscreen
document.getElementById('fsBtn').addEventListener('click', () => {
  const wrap = document.querySelector('.player-wrap');
  if (document.fullscreenElement) document.exitFullscreen();
  else wrap.requestFullscreen().catch(()=>{});
});

// Download
document.getElementById('dlBtn').addEventListener('click', () => {
  if (currentIdx < 0) return;
  const item = playlist[currentIdx];
  if (item.blobUrl) {
    const a = document.createElement('a');
    a.href = item.blobUrl;
    a.download = 'vidix_video.mp4';
    a.click();
  } else if (item.url) {
    window.open(item.url, '_blank');
  }
});

// ── Loading overlay ───────────────────────────────────────────────────────────
function showLoading(text) {
  document.getElementById('playerLoading').classList.remove('hide');
  document.getElementById('loadingText').textContent = text;
}
function hideLoading() {
  document.getElementById('playerLoading').classList.add('hide');
}

function showErr(msg) {
  document.getElementById('errCard').classList.add('show');
  document.getElementById('errText').textContent = '⚠ ' + msg;
  setTimeout(() => document.getElementById('errCard').classList.remove('show'), 5000);
}
function hideErr() { document.getElementById('errCard').classList.remove('show'); }
</script>
</body>
</html>
