<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VidPlay — Vidix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<script type="module" src="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/video-ui.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@videojs/html/cdn/player.css">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{background:#000;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;}

  .lg{background:rgba(255,255,255,0.01);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);box-shadow:inset 0 1px 1px rgba(255,255,255,0.1);position:relative;overflow:hidden;}
  .lg::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1.4px;background:linear-gradient(180deg,rgba(255,255,255,0.45) 0%,rgba(255,255,255,0.15) 20%,rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,0.15) 80%,rgba(255,255,255,0.45) 100%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}
  .lg-strong{background:rgba(255,255,255,0.05);backdrop-filter:blur(50px);-webkit-backdrop-filter:blur(50px);box-shadow:inset 0 1px 1px rgba(255,255,255,0.15);position:relative;overflow:hidden;}
  .lg-strong::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1.4px;background:linear-gradient(180deg,rgba(255,255,255,0.5) 0%,rgba(255,255,255,0.2) 20%,rgba(255,255,255,0) 40%,rgba(255,255,255,0) 60%,rgba(255,255,255,0.2) 80%,rgba(255,255,255,0.5) 100%);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;}

  /* nav */
  nav{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0;}
  .back-btn{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;flex-shrink:0;}
  .tool-badge{background:rgba(255,255,255,0.06);border-radius:999px;padding:6px 16px;font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:2px;text-transform:uppercase;}

  .page{max-width:520px;margin:0 auto;padding:0 20px 40px;}

  .hero{padding:20px 0 24px;text-align:center;}
  h1{font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(2.4rem,8vw,3.4rem);font-weight:400;letter-spacing:-0.02em;line-height:0.9;color:white;margin-bottom:12px;text-transform:uppercase;}
  .sub{font-size:13px;color:rgba(255,255,255,0.5);font-weight:300;line-height:1.6;max-width:300px;margin:0 auto;}

  /* url input */
  .section-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:8px;}
  .url-row{display:flex;align-items:center;gap:8px;border-radius:14px;padding:12px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);transition:border-color 0.2s;margin-bottom:6px;}
  .url-row:focus-within{border-color:rgba(255,255,255,0.2);}
  .url-input{flex:1;background:transparent;border:none;outline:none;color:white;font-size:13px;font-family:'Inter',sans-serif;}
  .url-input::placeholder{color:rgba(255,255,255,0.2);}
  .add-btn{background:rgba(255,255,255,0.1);border:none;border-radius:99px;padding:6px 14px;color:white;font-size:11px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:'Inter',sans-serif;transition:background 0.2s;}
  .add-btn:hover{background:rgba(255,255,255,0.18);}
  .platform-hint{font-size:10px;color:rgba(255,255,255,0.2);margin-bottom:14px;}

  /* playlist */
  .playlist{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
  .playlist-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);cursor:pointer;transition:all 0.2s;}
  .playlist-item:hover{background:rgba(255,255,255,0.07);}
  .playlist-item.active{background:rgba(255,255,255,0.09);border-color:rgba(255,255,255,0.2);}
  .playlist-item.error{border-color:rgba(255,80,80,0.3);}
  .playlist-item.done{border-color:rgba(100,255,100,0.15);}
  .item-icon{font-size:14px;flex-shrink:0;}
  .item-text{flex:1;font-size:12px;color:rgba(255,255,255,0.55);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .item-state{font-size:13px;flex-shrink:0;}
  .item-rm{background:none;border:none;color:rgba(255,255,255,0.2);cursor:pointer;font-size:18px;flex-shrink:0;line-height:1;transition:color 0.2s;}
  .item-rm:hover{color:rgba(255,80,80,0.8);}

  /* play btn */
  .play-btn{width:100%;border-radius:999px;padding:14px;background:white;color:black;border:none;font-family:'Instrument Serif',serif;font-style:italic;font-size:1.2rem;cursor:pointer;margin-bottom:14px;transition:opacity 0.2s;}
  .play-btn:hover{opacity:0.88;}
  .play-btn:disabled{opacity:0.28;cursor:not-allowed;}

  /* error */
  .err-card{border-radius:14px;padding:12px 16px;border:1px solid rgba(255,80,80,0.3);background:rgba(255,60,60,0.06);display:none;margin-bottom:10px;}
  .err-card.show{display:block;}
  .err-text{font-size:12px;color:rgba(255,120,120,0.9);line-height:1.5;}

  /* player section */
  .player-section{display:none;margin-bottom:14px;}
  .player-section.show{display:block;}

  /* loading card */
  .loading-card{border-radius:18px;padding:24px;text-align:center;margin-bottom:12px;display:none;}
  .loading-card.show{display:block;}
  .spinner{width:32px;height:32px;border:2px solid rgba(255,255,255,0.1);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-title{font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:4px;}
  .loading-sub{font-size:11px;color:rgba(255,255,255,0.3);}

  /* videojs html player */
  .player-wrap{border-radius:18px;overflow:hidden;margin-bottom:12px;}
  video-player{display:block;width:100%;}

  /* nav row */
  .nav-card{border-radius:16px;padding:14px 16px;display:none;}
  .nav-card.show{display:flex;align-items:center;gap:10px;}
  .nav-btn{background:rgba(255,255,255,0.07);border:none;border-radius:99px;padding:8px 16px;color:white;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;transition:background 0.2s;white-space:nowrap;}
  .nav-btn:hover{background:rgba(255,255,255,0.14);}
  .nav-btn:disabled{opacity:0.25;cursor:not-allowed;}
  .nav-info{flex:1;text-align:center;}
  .nav-count{font-size:11px;color:rgba(255,255,255,0.4);}
  .nav-url{font-size:10px;color:rgba(255,255,255,0.25);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;}

  /* download btn */
  .dl-btn{width:100%;border-radius:99px;padding:12px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;font-weight:500;color:white;cursor:pointer;border:none;background:transparent;font-family:'Inter',sans-serif;margin-bottom:6px;}
  .dl-btn:hover{opacity:0.7;}

  footer{text-align:center;padding:16px 0 24px;font-size:10px;color:rgba(255,255,255,0.1);letter-spacing:3px;text-transform:uppercase;}

  .fade-in{opacity:0;transform:translateY(14px);animation:fadeUp 0.5s ease forwards;}
  @keyframes fadeUp{to{opacity:1;transform:translateY(0);}}
  .d1{animation-delay:0.1s}.d2{animation-delay:0.2s}.d3{animation-delay:0.3s}.d4{animation-delay:0.42s}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .pulsing{animation:pulse 1.6s infinite;}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="back-btn lg">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
  </a>
  <div class="tool-badge">VidPlay</div>
  <div style="width:46px"></div>
</nav>

<div class="page">
  <div class="hero">
    <h1 class="fade-in d1">Play<br>Any Video</h1>
    <p class="sub fade-in d2">Paste links from any platform. Plays instantly — no ads, no redirects.</p>
  </div>

  <!-- Input -->
  <div class="fade-in d3">
    <div class="section-label">Video Links</div>
    <div class="url-row">
      <input class="url-input" id="urlInput" type="url" placeholder="Paste any video link...">
      <button class="add-btn" id="addBtn">Add</button>
    </div>
    <div class="platform-hint">Instagram · YouTube · Twitter/X · Reddit · Direct .mp4 links</div>
  </div>

  <!-- Error -->
  <div class="err-card" id="errCard"><p class="err-text" id="errText"></p></div>

  <!-- Playlist -->
  <div class="playlist" id="playlist"></div>

  <!-- Play button -->
  <button class="play-btn" id="playBtn" disabled>Play</button>

  <!-- Player section -->
  <div class="player-section" id="playerSection">

    <!-- Loading state -->
    <div class="loading-card lg-strong" id="loadingCard">
      <div class="spinner"></div>
      <div class="loading-title pulsing" id="loadingTitle">Loading video...</div>
      <div class="loading-sub" id="loadingSub"></div>
    </div>

    <!-- VideoJS HTML Player -->
    <div class="player-wrap" id="playerWrap" style="display:none;">
      <video-player id="vjsPlayer">
        <media-container class="media-default-skin media-default-skin--video">
          <video id="videoEl" playsinline></video>
          <media-buffering-indicator class="media-buffering-indicator">
            <div class="media-surface"><media-icon name="spinner" class="media-icon"></media-icon></div>
          </media-buffering-indicator>
          <media-error-dialog class="media-error">
            <div class="media-error__dialog media-surface">
              <div class="media-error__content">
                <media-alert-dialog-title class="media-error__title">Something went wrong.</media-alert-dialog-title>
                <media-alert-dialog-description class="media-error__description"></media-alert-dialog-description>
              </div>
              <div class="media-error__actions">
                <media-alert-dialog-close class="media-button media-button--primary">OK</media-alert-dialog-close>
              </div>
            </div>
          </media-error-dialog>
          <media-controls class="media-surface media-controls">
            <media-tooltip-group>
              <div class="media-button-group">
                <media-play-button commandfor="play-tooltip" class="media-button media-button--subtle media-button--icon media-button--play">
                  <media-icon name="restart" class="media-icon media-icon--restart"></media-icon>
                  <media-icon name="play" class="media-icon media-icon--play"></media-icon>
                  <media-icon name="pause" class="media-icon media-icon--pause"></media-icon>
                </media-play-button>
                <media-tooltip id="play-tooltip" side="top" class="media-surface media-tooltip"></media-tooltip>
                <media-seek-button seconds="-10" class="media-button media-button--subtle media-button--icon media-button--seek">
                  <span class="media-icon__container"><media-icon name="seek" class="media-icon media-icon--flipped"></media-icon><span class="media-icon__label">10</span></span>
                </media-seek-button>
                <media-seek-button seconds="10" class="media-button media-button--subtle media-button--icon media-button--seek">
                  <span class="media-icon__container"><media-icon name="seek" class="media-icon"></media-icon><span class="media-icon__label">10</span></span>
                </media-seek-button>
              </div>
              <div class="media-time-controls">
                <media-time type="current" class="media-time"></media-time>
                <media-time-slider class="media-slider">
                  <media-slider-track class="media-slider__track">
                    <media-slider-fill class="media-slider__fill"></media-slider-fill>
                    <media-slider-buffer class="media-slider__buffer"></media-slider-buffer>
                  </media-slider-track>
                  <media-slider-thumb class="media-slider__thumb"></media-slider-thumb>
                  <div class="media-surface media-preview media-slider__preview">
                    <media-slider-thumbnail class="media-preview__thumbnail"></media-slider-thumbnail>
                    <media-slider-value type="pointer" class="media-time media-preview__time"></media-slider-value>
                  </div>
                </media-time-slider>
                <media-time type="duration" class="media-time"></media-time>
              </div>
              <div class="media-button-group">
                <media-playback-rate-menu-trigger commandfor="playback-rate-menu" class="media-button media-button--subtle media-button--icon media-button--playback-rate"></media-playback-rate-menu-trigger>
                <media-playback-rate-menu id="playback-rate-menu" side="top" align="center" class="media-surface media-popover media-menu media-menu--playback-rate">
                  <media-playback-rate-options class="media-menu__group">
                    <template>
                      <media-menu-radio-item class="media-menu__item">
                        <span data-part="label"></span>
                        <media-menu-item-indicator force-mount class="media-menu__indicator"><media-icon name="check" class="media-icon"></media-icon></media-menu-item-indicator>
                      </media-menu-radio-item>
                    </template>
                  </media-playback-rate-options>
                </media-playback-rate-menu>
                <media-mute-button class="media-button media-button--subtle media-button--icon media-button--mute">
                  <media-icon name="volume-off" class="media-icon media-icon--volume-off"></media-icon>
                  <media-icon name="volume-low" class="media-icon media-icon--volume-low"></media-icon>
                  <media-icon name="volume-high" class="media-icon media-icon--volume-high"></media-icon>
                </media-mute-button>
                <media-pip-button commandfor="pip-tooltip" class="media-button media-button--subtle media-button--icon media-button--pip">
                  <media-icon name="pip-enter" class="media-icon media-icon--pip-enter"></media-icon>
                  <media-icon name="pip-exit" class="media-icon media-icon--pip-exit"></media-icon>
                </media-pip-button>
                <media-tooltip id="pip-tooltip" side="top" class="media-surface media-tooltip"></media-tooltip>
                <media-fullscreen-button commandfor="fullscreen-tooltip" class="media-button media-button--subtle media-button--icon media-button--fullscreen">
                  <media-icon name="fullscreen-enter" class="media-icon media-icon--fullscreen-enter"></media-icon>
                  <media-icon name="fullscreen-exit" class="media-icon media-icon--fullscreen-exit"></media-icon>
                </media-fullscreen-button>
                <media-tooltip id="fullscreen-tooltip" side="top" class="media-surface media-tooltip"></media-tooltip>
              </div>
            </media-tooltip-group>
          </media-controls>
          <media-gesture type="tap" action="togglePaused" pointer="mouse" region="center"></media-gesture>
          <media-gesture type="tap" action="toggleControls" pointer="touch"></media-gesture>
          <media-gesture type="doubletap" action="seekStep" value="-10" region="left"></media-gesture>
          <media-gesture type="doubletap" action="toggleFullscreen" region="center"></media-gesture>
          <media-gesture type="doubletap" action="seekStep" value="10" region="right"></media-gesture>
          <media-hotkey keys="Space" action="togglePaused"></media-hotkey>
          <media-hotkey keys="f" action="toggleFullscreen"></media-hotkey>
          <media-hotkey keys="m" action="toggleMuted"></media-hotkey>
          <media-hotkey keys="i" action="togglePictureInPicture"></media-hotkey>
          <media-hotkey keys="ArrowRight" action="seekStep" value="5"></media-hotkey>
          <media-hotkey keys="ArrowLeft" action="seekStep" value="-5"></media-hotkey>
        </media-container>
      </video-player>
    </div>

    <!-- Nav row -->
    <div class="nav-card lg-strong" id="navCard">
      <button class="nav-btn" id="prevBtn">⏮ Prev</button>
      <div class="nav-info">
        <div class="nav-count" id="navCount"></div>
        <div class="nav-url" id="navUrl"></div>
      </div>
      <button class="nav-btn" id="nextBtn">Next ⏭</button>
    </div>

    <!-- Download -->
    <button class="dl-btn lg" id="dlBtn">⬇ Download current video</button>

  </div>

  <footer>Vidix — AI Video Suite</footer>
</div>

<script>
const BACKEND = "https://runitdamar-clipcut-backend.hf.space";

let playlist = []; // [{url, status, blobUrl, jobId}]
let currentIdx = -1;

function platformIcon(url) {
  if (url.includes('instagram')) return '📸';
  if (url.includes('youtube') || url.includes('youtu.be')) return '▶️';
  if (url.includes('twitter') || url.includes('x.com')) return '🐦';
  if (url.includes('reddit')) return '🤖';
  if (/\.(mp4|webm|mov|ogg)(\?.*)?$/i.test(url)) return '🎬';
  return '🔗';
}

function cleanUrl(url) {
  try {
    const u = new URL(url);
    if (u.hostname.includes('instagram.com')) return 'https://www.instagram.com' + u.pathname.replace(/\/$/, '') + '/';
    ['utm_source','utm_medium','utm_campaign','igsh','si','s','t'].forEach(p => u.searchParams.delete(p));
    u.hash = '';
    return u.toString();
  } catch(e) { return url; }
}

function shortUrl(url) {
  try { const u = new URL(url); return u.hostname.replace('www.','') + u.pathname.slice(0,28); }
  catch(e) { return url.slice(0,36); }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── URL input ─────────────────────────────────────────────────────────────────
document.getElementById('addBtn').addEventListener('click', addUrl);
document.getElementById('urlInput').addEventListener('keydown', e => { if(e.key==='Enter') addUrl(); });

function addUrl() {
  const val = document.getElementById('urlInput').value.trim();
  if (!val) return;
  if (!val.startsWith('http')) { showErr('Please enter a valid URL starting with http'); return; }
  hideErr();
  playlist.push({ url: cleanUrl(val), status: 'idle', streamUrl: null, jobId: null });
  document.getElementById('urlInput').value = '';
  renderPlaylist();
  document.getElementById('playBtn').disabled = false;
}

function renderPlaylist() {
  const el = document.getElementById('playlist');
  el.innerHTML = '';
  playlist.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'playlist-item' +
      (i === currentIdx ? ' active' : '') +
      (item.status === 'error' ? ' error' : '') +
      (item.status === 'done' ? ' done' : '');
    div.innerHTML = `
      <span class="item-icon">${platformIcon(item.url)}</span>
      <span class="item-text">${shortUrl(item.url)}</span>
      <span class="item-state">${
        item.status === 'loading' ? '⏳' :
        item.status === 'done' ? '✓' :
        item.status === 'error' ? '✗' :
        i === currentIdx ? '▶' : ''
      }</span>
      ${currentIdx === -1 ? `<button class="item-rm" onclick="removeItem(event,${i})">×</button>` : ''}
    `;
    div.addEventListener('click', () => playItem(i));
    el.appendChild(div);
  });
  if (currentIdx >= 0) {
    document.getElementById('navCount').textContent = `${currentIdx+1} of ${playlist.length}`;
    document.getElementById('navUrl').textContent = shortUrl(playlist[currentIdx].url);
    document.getElementById('navCard').classList.add('show');
    document.getElementById('prevBtn').disabled = currentIdx === 0;
    document.getElementById('nextBtn').disabled = currentIdx === playlist.length - 1;
  }
}

function removeItem(e, i) {
  e.stopPropagation();
  playlist.splice(i, 1);
  renderPlaylist();
  if (playlist.length === 0) document.getElementById('playBtn').disabled = true;
}

// ── Play ──────────────────────────────────────────────────────────────────────
document.getElementById('playBtn').addEventListener('click', () => { if (playlist.length) playItem(0); });
document.getElementById('prevBtn').addEventListener('click', () => { if (currentIdx > 0) playItem(currentIdx-1); });
document.getElementById('nextBtn').addEventListener('click', () => { if (currentIdx < playlist.length-1) playItem(currentIdx+1); });

async function playItem(idx) {
  if (idx < 0 || idx >= playlist.length) return;
  currentIdx = idx;
  const item = playlist[idx];
  renderPlaylist();
  document.getElementById('playerSection').classList.add('show');
  hideErr();

  // Already have stream URL
  if (item.streamUrl) {
    loadInPlayer(item.streamUrl);
    return;
  }

  // Direct video URL — play immediately
  if (/\.(mp4|webm|mov|ogg|m4v)(\?.*)?$/i.test(item.url)) {
    item.status = 'done'; renderPlaylist();
    loadInPlayer(item.url); return;
  }

  // Try direct play first (works for some sites)
  showLoading('Trying direct play...');
  const vid = document.getElementById('videoEl');
  vid.src = item.url; vid.load();
  const direct = await new Promise(res => {
    const t = setTimeout(() => res('fail'), 4000);
    vid.oncanplay = () => { clearTimeout(t); res('ok'); };
    vid.onerror = () => { clearTimeout(t); res('fail'); };
  });

  if (direct === 'ok') {
    hideLoading(); showPlayer();
    vid.play(); item.status = 'done'; renderPlaylist(); return;
  }

  // Use HF Space backend → Replit → download
  showLoading('Fetching via Vidix...', 'Connecting to download service');
  item.status = 'loading'; renderPlaylist();

  try {
    const jobId = 'vp_' + Math.random().toString(36).slice(2,8) + Date.now();
    item.jobId = jobId;

    const r = await fetch(`${BACKEND}/vidplay/fetch?url=${encodeURIComponent(item.url)}&job_id=${jobId}`, {
      method: 'POST'
    });
    if (!r.ok) { const d = await r.json(); throw new Error(d.detail || 'Failed to start'); }

    // Poll HF Space
    for (let i = 0; i < 120; i++) {
      await sleep(2500);
      const sr = await fetch(`${BACKEND}/vidplay/status/${jobId}`);
      if (!sr.ok) continue;
      const d = await sr.json();
      document.getElementById('loadingSub').textContent = d.status_text || '';
      if (d.status === 'done') break;
      if (d.status === 'failed') throw new Error(d.error || 'Download failed');
    }

    // Use stream URL directly as video src
    const streamUrl = `${BACKEND}/vidplay/stream/${jobId}`;
    item.streamUrl = streamUrl;
    item.status = 'done';

    hideLoading(); showPlayer();
    loadInPlayer(streamUrl);
    renderPlaylist();

  } catch(e) {
    item.status = 'error'; hideLoading();
    showErr(`Failed: ${e.message}`);
    renderPlaylist();
    if (idx + 1 < playlist.length) setTimeout(() => playItem(idx+1), 2500);
  }
}

function loadInPlayer(src) {
  const vid = document.getElementById('videoEl');
  vid.src = src; vid.load();
  vid.play().catch(()=>{});
  vid.onended = () => {
    if (currentIdx + 1 < playlist.length) playItem(currentIdx + 1);
  };
  showPlayer();
}

function showPlayer() {
  document.getElementById('playerWrap').style.display = 'block';
  document.getElementById('loadingCard').classList.remove('show');
}

function showLoading(text, sub) {
  document.getElementById('loadingCard').classList.add('show');
  document.getElementById('playerWrap').style.display = 'none';
  document.getElementById('loadingTitle').textContent = text;
  document.getElementById('loadingSub').textContent = sub || '';
}

function hideLoading() { document.getElementById('loadingCard').classList.remove('show'); }

// Download
document.getElementById('dlBtn').addEventListener('click', () => {
  if (currentIdx < 0) return;
  const item = playlist[currentIdx];
  if (item.streamUrl) window.open(item.streamUrl, '_blank');
  else if (item.url) window.open(item.url, '_blank');
});

function showErr(msg) {
  document.getElementById('errCard').classList.add('show');
  document.getElementById('errText').textContent = '⚠ ' + msg;
  setTimeout(() => document.getElementById('errCard').classList.remove('show'), 6000);
}
function hideErr() { document.getElementById('errCard').classList.remove('show'); }
</script>
</body>
</html>
